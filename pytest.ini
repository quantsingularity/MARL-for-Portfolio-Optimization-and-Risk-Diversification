[pytest]
testpaths = portfolio/tests
# importlib import mode keeps test/conftest imports independent of the
# package directory name and avoids sys.path edge cases.
addopts = --import-mode=importlib
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning:sklearn.*
    ignore:.*does not have valid feature names.*
